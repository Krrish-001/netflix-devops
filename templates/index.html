<!DOCTYPE html>
<html>

<head>
    <title>Netflix Clone</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #141414;
            color: white;
        }

        /* Navbar */
        .navbar {
            background: black;
            padding: 15px 30px;
            font-size: 24px;
            font-weight: bold;
            color: red;
        }

        /* Banner */
        .banner {
            height: 400px;
            background: url('https://images.unsplash.com/photo-1524985069026-dd778a71c7b4') no-repeat center center/cover;
            display: flex;
            align-items: center;
            padding-left: 40px;
        }

        .banner h1 {
            font-size: 50px;
        }

        /* Movie Section */
        .section {
            padding: 20px;
        }

        .movies {
            display: flex;
            gap: 15px;
            overflow-x: auto;
        }

        .movie {
            min-width: 200px;
            height: 300px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.3s;
        }

        .movie:hover {
            transform: scale(1.1);
        }

        .movie img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Scrollbar hide */
        .movies::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>

<body>

    <div class="navbar">
        NETFLIX
    </div>

    <div class="banner">
        <h1>Unlimited Movies, TV Shows & More</h1>
    </div>

    <div class="section">
        <h2>Trending Now</h2>
        <div class="movies">
            <div class="movie"><img src="https://via.placeholder.com/200x300"></div>
            <div class="movie"><img src="https://via.placeholder.com/200x300"></div>
            <div class="movie"><img src="https://via.placeholder.com/200x300"></div>
            <div class="movie"><img src="https://via.placeholder.com/200x300"></div>
        </div>
    </div>

    <div class="section">
        <h2>Trending Now</h2>
        <div class="movies">
            {% for movie in movies %}
            <div class="movie">
                <img src="{{ movie.image }}">
            </div>
            {% endfor %}
        </div>
    </div>
</body>

</html>
