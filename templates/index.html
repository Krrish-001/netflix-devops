<!DOCTYPE html>
<html>

<head>
    <title>Netflix Clone</title>

    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-color: #141414;
            color: white;
        }

        /* NAVBAR */
        .navbar {
            position: fixed;
            width: 100%;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 40px;
            font-size: 28px;
            font-weight: bold;
            color: #e50914;
            z-index: 10;
        }

        /* HERO BANNER */
        .banner {
            height: 80vh;
            background: linear-gradient(to top, #141414, transparent),
                url('https://images.unsplash.com/photo-1608889175123-8ee362201f81');
            background-size: cover;
            display: flex;
            align-items: center;
            padding-left: 50px;
        }

        .banner h1 {
            font-size: 60px;
            max-width: 600px;
        }

        /* SECTION */
        .section {
            padding: 40px;
        }

        .section h2 {
            margin-bottom: 15px;
        }

        /* MOVIE GRID */
        .movies {
            display: flex;
            gap: 15px;
            overflow-x: auto;
        }

        .movie {
            min-width: 180px;
            height: 270px;
            border-radius: 10px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .movie img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* HOVER EFFECT */
        .movie:hover {
            transform: scale(1.1);
            z-index: 2;
        }

        /* SCROLLBAR HIDE */
        .movies::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>

<body>

    <div class="navbar">
        NETFLIX
    </div>

    <div class="banner">
        <h1>Unlimited Movies, TV Shows & More</h1>
    </div>

    <!-- ONLY ONE SECTION -->
    <div class="section">
        <h2>Trending Now</h2>

        <div class="movies">
            {% for movie in movies %}
            <div class="movie">
                <img src="{{ movie.image }}" alt="{{ movie.title }}">
            </div>
            {% endfor %}
        </div>
    </div>

</body>

</html>
